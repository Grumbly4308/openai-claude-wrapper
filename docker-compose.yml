services:
  claude-wrapper:
    build:
      context: .
      dockerfile: Dockerfile
    image: claude-wrapper:latest
    container_name: claude-wrapper
    restart: unless-stopped
    # Default command: run the OpenAI-compatible API server.
    # Run a one-time login with:
    #   docker compose run --rm -it claude-wrapper login
    # or a long-lived headless token with:
    #   docker compose run --rm -it claude-wrapper setup-token
    # Either writes credentials to the `claude-home` volume below, which
    # persists across container rebuilds and restarts.
    command: ["serve"]
    # Explicitly bind on 0.0.0.0 so the server is reachable from any
    # network interface on the host, not just the loopback-by-default
    # that some Docker configs fall back to.
    ports:
      - "0.0.0.0:${CLAUDE_WRAPPER_PORT:-8000}:${CLAUDE_WRAPPER_PORT:-8000}"
    environment:
      # Container-internal uvicorn port. Must match the host port above
      # so the compose mapping is a straight pass-through.
      CLAUDE_WRAPPER_PORT: "${CLAUDE_WRAPPER_PORT:-8000}"
      CLAUDE_WRAPPER_HOST: "0.0.0.0"

      # Optional: fall back to env-based auth instead of the persisted
      # OAuth login. Leave blank once you've run `compose run … login`.
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      CLAUDE_CODE_OAUTH_TOKEN: "${CLAUDE_CODE_OAUTH_TOKEN:-}"

      # Comma-separated bearer tokens clients must send as
      # `Authorization: Bearer <key>`. Leave unset to disable wrapper auth.
      CLAUDE_WRAPPER_API_KEYS: "${CLAUDE_WRAPPER_API_KEYS:-}"

      # If set, the wrapper emits markdown download links for generated
      # files in assistant output, e.g. [report.pdf](http://host:8000/v1/files/file-.../content).
      # Point this at whatever URL clients (Open WebUI, etc.) can reach the
      # wrapper on. Leave unset to fall back to the plain "file_id=…" block.
      CLAUDE_WRAPPER_PUBLIC_BASE_URL: "${CLAUDE_WRAPPER_PUBLIC_BASE_URL:-}"

      CLAUDE_WRAPPER_DEFAULT_MODEL: "${CLAUDE_WRAPPER_DEFAULT_MODEL:-claude-opus-4-8}"

      # Reasoning effort forwarded to every `claude` invocation: low | medium |
      # high | xhigh | max are passed as `--effort <level>`. "ultracode" is also
      # accepted — it is not a --effort value but requests xhigh effort plus
      # ultracode's dynamic-workflow orchestration opt-in via `--settings`.
      # Applies to Opus 4.5+ models. Leave blank to use the CLI's own default.
      CLAUDE_WRAPPER_EFFORT: "${CLAUDE_WRAPPER_EFFORT:-max}"
      CLAUDE_WRAPPER_MAX_UPLOAD_BYTES: "${CLAUDE_WRAPPER_MAX_UPLOAD_BYTES:-2147483648}"
      CLAUDE_WRAPPER_REQUEST_TIMEOUT: "${CLAUDE_WRAPPER_REQUEST_TIMEOUT:-1800}"
      CLAUDE_WRAPPER_WORKERS: "${CLAUDE_WRAPPER_WORKERS:-1}"

      # Per-conversation token cap. Each conversation may spend
      # ALLOWANCE x PERCENT tokens before the wrapper pauses with a checkpoint
      # message; reply with a continue keyword to grant another block, or start
      # a new chat to reset. ON by default at the Max 5x ($100) plan. Set the
      # allowance by plan (pro | max 5x | max 20x — an estimate scaled from
      # PRO_SESSION_TOKENS) or directly via SESSION_TOKEN_ALLOWANCE (which wins).
      # Set the plan to "off" to disable the cap.
      CLAUDE_WRAPPER_SESSION_PLAN: "${CLAUDE_WRAPPER_SESSION_PLAN:-max 5x}"
      CLAUDE_WRAPPER_PRO_SESSION_TOKENS: "${CLAUDE_WRAPPER_PRO_SESSION_TOKENS:-1500000}"
      CLAUDE_WRAPPER_SESSION_TOKEN_ALLOWANCE: "${CLAUDE_WRAPPER_SESSION_TOKEN_ALLOWANCE:-0}"
      CLAUDE_WRAPPER_SESSION_BLOCK_PERCENT: "${CLAUDE_WRAPPER_SESSION_BLOCK_PERCENT:-5}"
      CLAUDE_WRAPPER_BUDGET_CONTINUE_KEYWORD: "${CLAUDE_WRAPPER_BUDGET_CONTINUE_KEYWORD:-continue,proceed,keep going,go on,yes}"

      # When set, the wrapper injects a system-prompt addendum telling
      # Claude how to query OpenWebUI's retrieval API. The api key passes
      # through to Claude's Bash tool via env, never into the prompt.
      OPENWEBUI_BASE_URL: "${OPENWEBUI_BASE_URL:-}"
      OPENWEBUI_API_KEY: "${OPENWEBUI_API_KEY:-}"
      OPENWEBUI_DEFAULT_COLLECTION: "${OPENWEBUI_DEFAULT_COLLECTION:-}"
    volumes:
      # Uploads, generated outputs, per-session workspaces, session id map.
      - claude-data:/data
      # Host-side drop folder. Put files here on the host; reference them
      # in chat as /data/inbox/<file> so Claude reads the real bytes
      # instead of OWU's text extraction. Read-only by default.
      - /home/vbox/inbox:/data/inbox:ro
      # Claude Code's own state — credentials live here, so this is the
      # volume that makes `compose run … login` survive restarts.
      - claude-home:/home/claude/.claude
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${CLAUDE_WRAPPER_PORT:-8000}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  claude-data:
  claude-home:
